<!-- Contact Section -->

    <h2>Contact Us</h2>

      <textarea placeholder="Your Message" rows="5" required></textarea>
      <button type="submit">Send Message</button>
    </form>
    <!-- Links -->
    <div class="contact-links">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
  </section>
